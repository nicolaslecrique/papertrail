name: CI

# Runs the same gate as local dev - `just check`, which runs scripts/check.sh -
# on every push, inside the exact same devcontainer image used locally
# (.devcontainer/Dockerfile, via the CI-only .devcontainer/ci/devcontainer.json -
# see its comments for why it's a separate file from the dev one). Building the
# image is what installs uv/gitleaks/just/Node-pnpm/Playwright's Chromium, so
# there's no separate tool-install step here to keep in sync with the Dockerfile.
on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push the built devcontainer image to GHCR for build-layer caching

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      # The gate honours TEST_DATABASE_URL for pytest, the alembic check, and the
      # e2e servers. `just check` runs *inside* the devcontainer, on the compose
      # network defined by docker-compose.yml, so Postgres is reachable at the
      # `db` service hostname (started automatically alongside `app` - same as a
      # local `docker compose up`), not localhost.
      TEST_DATABASE_URL: postgresql://papertrail:papertrail@db:5432/papertrail_test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks scans the full history

      - name: Log in to GHCR (for devcontainer image caching)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the devcontainer and run the quality gate
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/ci/devcontainer.json
          imageName: ghcr.io/nicolaslecrique/papertrail-devcontainer
          cacheFrom: ghcr.io/nicolaslecrique/papertrail-devcontainer
          push: filter
          refFilterForPush: refs/heads/main
          env: |
            TEST_DATABASE_URL
          runCmd: just check
