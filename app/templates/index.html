<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>papertrail — Hello World</title>
    <link rel="stylesheet" href="/static/app.css" />
    <script src="/static/htmx.min.js" defer></script>
  </head>
  <body class="min-h-screen bg-base-200">
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex-1">
        <span class="btn btn-ghost text-xl">papertrail</span>
      </div>
    </div>

    <main class="flex items-center justify-center p-8">
      <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
          <h1 class="card-title text-2xl">Hello World</h1>
          <p class="text-base-content/70">
            FastAPI + htmx + Jinja2 + daisyUI. Type a name and let htmx swap in a
            greeting.
          </p>

          <form
            hx-post="/greet"
            hx-target="#greeting"
            hx-swap="innerHTML"
            class="mt-2 flex flex-col gap-3"
          >
            <input
              type="text"
              name="name"
              placeholder="Your name"
              class="input input-bordered w-full"
              aria-label="Your name"
            />
            <button type="submit" class="btn btn-primary">Greet me</button>
          </form>

          <div id="greeting" class="mt-4"></div>
        </div>
      </div>
    </main>
  </body>
</html>
