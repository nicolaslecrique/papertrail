{% if kind == "error" %}
    <div class="alert alert-error" role="alert">
        <span>{{ message }}</span>
    </div>
{% elif kind == "success" %}
    <div class="alert alert-success" role="alert">
        <span>{{ message }}</span>
    </div>
{% elif kind == "warning" %}
    <div class="alert alert-warning" role="alert">
        <span>{{ message }}</span>
    </div>
{% else %}
    <div class="alert alert-info" role="alert">
        <span>{{ message }}</span>
    </div>
{% endif %}
