{% extends "base.html" %}
{% block title %}Reset password — papertrail{% endblock title %}
{% block content %}
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h1 class="card-title text-2xl">Reset your password</h1>
            <p class="text-base-content/70">Enter your email and we'll send you a link to choose a new password.</p>
            <form hx-post="/forgot-password"
                  hx-target="#form-msg"
                  hx-swap="innerHTML"
                  class="mt-2 flex flex-col gap-3">
                <input type="email"
                       name="email"
                       required
                       placeholder="Email"
                       autocomplete="email"
                       class="input input-bordered w-full"
                       aria-label="Email" />
                <button type="submit" class="btn btn-primary">Send reset link</button>
            </form>
            <div id="form-msg" class="mt-2"></div>
            <div class="mt-4 text-sm">
                <a href="/login" class="link">Back to sign in</a>
            </div>
        </div>
    </div>
{% endblock content %}
